# Gloxx Visibility Probe — Prompt Set v1
#
# 75 prompts across 8 clusters used to measure Gloxx visibility in
# answer engines (ChatGPT, Claude, Perplexity, Gemini, Copilot,
# Google AI Overviews).
#
# This file is load-bearing: changes to prompt IDs must preserve
# back-compatibility for time-series comparison. Add new prompts at
# the end of each cluster, do not renumber existing ones.
#
# License: CC-BY 4.0. The methodology, including this file, is
# published openly so anyone can audit how Gloxx measures itself.

version: 1
date: 2026-05-03
license: CC-BY-4.0

clusters:

  - id: A
    name: Fractional QA / QA Leadership
