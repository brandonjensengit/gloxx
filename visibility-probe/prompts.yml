# Engines polled, in order:
engines:
  - id: openai
    name: OpenAI
    model: gpt-4o-search-preview
    notes: Uses ChatGPT search-grounded model for parity with consumer ChatGPT browsing.
  - id: anthropic
    name: Anthropic
    model: claude-sonnet-4-7
    notes: Web search tool enabled.
  - id: perplexity
    name: Perplexity
    model: sonar-pro
    notes: Default Perplexity Sonar model.
  - id: gemini
    name: Google
    model: gemini-2.5-pro-grounded
    notes: Google Search grounding enabled for parity with AI Overviews.

# Sampling cadence:
schedule:
  cron: "0 9 * * 1"  # Mondays 09:00 UTC
  timezone: UTC
